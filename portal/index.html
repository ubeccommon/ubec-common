<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBEC Commons — Redirecting…</title>
  <meta http-equiv="refresh" content="0;url=/en/">
  <meta name="robots" content="noindex">
</head>
<body>
<script>
  var lang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2).toLowerCase();
  var map = { de: '/de/', pl: '/pl/' };
  window.location.replace(map[lang] || '/en/');
</script>
<noscript>
  <p><a href="/en/">Continue in English</a> · <a href="/de/">Weiter auf Deutsch</a> · <a href="/pl/">Kontynuuj po polsku</a></p>
</noscript>
</body>
</html>
